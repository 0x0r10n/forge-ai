name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun-version: ['1.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          node dist/deepcode.js --version
          node dist/deepcode.js --help
          node dist/deepcode.js models

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          node dist/deepcode.js --version
          node dist/deepcode.js --help
          node dist/deepcode.js models
        shell: cmd
